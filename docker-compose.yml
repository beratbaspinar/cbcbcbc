services:
  sam_rviz2_system:
    build: .
    container_name: sam_rviz2_system
    # X11 için ortam değişkenlerini paylaşıyoruz
    environment:
      - DISPLAY=host.docker.internal:0.0
      - QT_X11_NO_MITSHM=1
    # Eğer kameraya host network üzerinden bağlanacaksak
    ports:
      - "8080:8080"
    restart: unless-stopped
