# one_camera_mapping - tum node parametreleri
# Ortam degiskenleri launch dosyasinda bu degerleri override edebilir.

/**:
  ros__parameters:
    calib_path: "/ros2_ws/assets/stereo_calibration.npz"

camera_ingest_left:
  ros__parameters:
    side: "left"
    stream_url: "http://192.168.1.191:5000/video_feed"
    frame_id: "camera_optical_frame"
    publish_rate: 15.0
    reconnect_period: 2.0

camera_ingest_right:
  ros__parameters:
    side: "right"
    stream_url: "http://host.docker.internal:5001/video_feed"
    frame_id: "camera_optical_frame"
    publish_rate: 15.0
    reconnect_period: 2.0

stereo_depth_node:
  ros__parameters:
    optical_frame: "camera_optical_frame"
    map_frame: "map"
    # SGBM
    min_disparity: 0
    num_disparities: 96       # 16'nin kati
    block_size: 7
    uniqueness_ratio: 10
    speckle_window_size: 100
    speckle_range: 2
    use_wls: true
    wls_lambda: 8000.0
    wls_sigma: 1.5
    # Filtreleme (metre)
    min_range: 0.1
    max_range: 30.0
    cloud_decimation: 2       # nokta bulutu seyreltme
    process_rate: 6.0
    # Yer duzlemi
    ground_enable: true
    ground_threshold: 0.05
    ground_min_confidence: 0.2
    # Yer duzlemi bulunamazsa fallback (kamera yuksekligi m, tilt derece)
    fallback_camera_height: 1.0
    fallback_tilt_deg: 0.0

detection_node:
  ros__parameters:
    model_path: "/ros2_ws/assets/yolov8s-worldv2.pt"
    classes: ["traffic cone", "curbstone", "pole", "concrete barrier",
              "car", "truck", "person", "tripod", "box", "table", "chair", "desk", "door", "wall"]
    confidence: 0.25
    process_rate: 4.0
    input_topic: "/camera/image_raw"

fusion_node:
  ros__parameters:
    optical_frame: "camera_optical_frame"
    depth_sample_ratio: 0.5     # kutu merkez bolgesi orani
    min_range: 0.1
    max_range: 30.0
    marker_lifetime: 1.0

mapping_node:
  ros__parameters:
    map_frame: "map"
    resolution: 0.10            # metre/hucre
    width: 200                  # hucre (20 m)
    height: 200
    origin_x: -10.0
    origin_y: -10.0
    hit_increment: 25
    miss_decrement: 0
    decay_period: 5.0
    use_obstacle_cloud: true
    use_detections: true
    obstacle_min_height: 0.10   # zeminden bu yukseklik ustu engel sayilir
    obstacle_max_height: 2.5
    map_save_path: "/ros2_ws/assets/maps/occupancy_map.npz"
    publish_rate: 2.0

wave_bridge_node:
  ros__parameters:
    map_frame: "map"
    websocket_port: 8765
    grid_cols: 20
    grid_rows: 20
    publish_rate: 10.0
